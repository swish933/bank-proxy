# fly.toml app configuration file generated for bank-proxy on 2026-06-04T17:17:07Z
#
# See https://fly.io/docs/reference/configuration/ for information about how to use this file.
#

app = 'bank-proxy'
primary_region = 'lhr'

[build]

[env]
  NODE_ENV = 'production'
  PORT = '8080'

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = 'stop'
  auto_start_machines = true
  min_machines_running = 0
  processes = ['app']

[[vm]]
  memory = '1gb'
  cpu_kind = 'shared'
  cpus = 1
  memory_mb = 256
